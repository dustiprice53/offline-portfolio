<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>OFFLINE</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
margin: 0;
background: black;
color: #ff4df0;
font-family: monospace;
text-align: center;
overflow-x: hidden;
}

/* GLITCH TITLE */
.glitch {
font-size: 70px;
position: relative;
animation: flicker 2s infinite;
}

.glitch::before,
.glitch::after {
content: "OFFLINE";
position: absolute;
left: 0;
width: 100%;
}

.glitch::before {
color: red;
animation: glitchTop 1s infinite;
}

.glitch::after {
color: blue;
animation: glitchBottom 1s infinite;
}

/* ANIMATION 1 */
@keyframes glitchTop {
0% {transform: translate(0);}
20% {transform: translate(-3px, -3px);}
40% {transform: translate(3px, 3px);}
60% {transform: translate(-2px, 2px);}
100% {transform: translate(0);}
}

/* ANIMATION 2 */
@keyframes glitchBottom {
0% {transform: translate(0);}
20% {transform: translate(3px, 3px);}
40% {transform: translate(-3px, -3px);}
60% {transform: translate(2px, -2px);}
100% {transform: translate(0);}
}

/* ANIMATION 3 */
@keyframes flicker {
0% {opacity: 1;}
50% {opacity: 0.5;}
100% {opacity: 1;}
}

/* BUTTON */
button {
margin-top: 20px;
padding: 12px 25px;
border: 1px solid #ff4df0;
background: black;
color: #ff4df0;
cursor: pointer;
transition: 0.3s;
}

/* ANIMATION 4 */
button:hover {
transform: scale(1.2);
background: #ff4df0;
color: black;
}

/* SCANLINES EFFECT */
/* ANIMATION 5 */
body::after {
content: "";
position: fixed;
top: 0;
left: 0;
width: 100%;
height: 100%;
background: repeating-linear-gradient(
transparent,
transparent 2px,
rgba(255, 0, 150, 0.1) 3px
);
animation: scan 4s linear infinite;
pointer-events: none;
}

@keyframes scan {
from {transform: translateY(0);}
to {transform: translateY(10px);}
}

/* POPUP */
/* ANIMATION 6 */
.popup {
display: none;
position: fixed;
top: 50%;
left: 50%;
transform: translate(-50%, -50%) scale(0.5);
background: black;
border: 1px solid #ff4df0;
padding: 20px;
animation: pop 0.4s forwards;
}

@keyframes pop {
from {opacity: 0; transform: translate(-50%, -50%) scale(0.5);}
to {opacity: 1; transform: translate(-50%, -50%) scale(1);}
}

/* EXTRA ANIMATION 7 */
.subtitle {
animation: fade 3s infinite;
}

@keyframes fade {
0% {opacity: 0;}
50% {opacity: 1;}
100% {opacity: 0;}
}

</style>
</head>

<body>

<h1 class="glitch">OFFLINE</h1>

<p class="subtitle">enter my world</p>

<button id="openBtn">ENTER</button>

<div id="popup" class="popup">
<p>Welcome to my digital glitch space</p>
<button id="closeBtn">close</button>
</div>

<script>
document.getElementById("openBtn").onclick = function() {
document.getElementById("popup").style.display = "block";
}

document.getElementById("closeBtn").onclick = function() {
document.getElementById("popup").style.display = "none";
}
</script>

</body>
</html>
