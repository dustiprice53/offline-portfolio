<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>OFFLINE</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
margin: 0;
background: black;
color: #ff4df0;
font-family: monospace;
text-align: center;
overflow: hidden;
}

/* 1 — flicker */
.glitch {
font-size: 60px;
position: relative;
animation: flicker 2s infinite;
}

/* 2 — glitch top */
.glitch::before {
content: "OFFLINE";
position: absolute;
left: 0;
color: red;
animation: glitchTop 1s infinite;
}

/* 3 — glitch bottom */
.glitch::after {
content: "OFFLINE";
position: absolute;
left: 0;
color: blue;
animation: glitchBottom 1s infinite;
}

/* keyframes */
@keyframes flicker {
0% {opacity: 1;}
50% {opacity: 0.5;}
100% {opacity: 1;}
}

@keyframes glitchTop {
0% {transform: translate(0);}
25% {transform: translate(-3px, -3px);}
50% {transform: translate(3px, 3px);}
100% {transform: translate(0);}
}

@keyframes glitchBottom {
0% {transform: translate(0);}
25% {transform: translate(3px, 3px);}
50% {transform: translate(-3px, -3px);}
100% {transform: translate(0);}
}

/* 4 — button hover */
button {
margin: 10px;
padding: 10px 20px;
border: 1px solid #ff4df0;
background: black;
color: #ff4df0;
cursor: pointer;
transition: 0.3s;
}

button:hover {
transform: scale(1.2);
background: #ff4df0;
color: black;
}

/* 5 — scanlines */
body::after {
content: "";
position: fixed;
width: 100%;
height: 100%;
background: repeating-linear-gradient(
transparent,
transparent 2px,
rgba(255, 0, 150, 0.1) 3px
);
animation: scan 4s linear infinite;
pointer-events: none;
}

@keyframes scan {
from {transform: translateY(0);}
to {transform: translateY(10px);}
}

/* 6 — fade in */
.fade {
animation: fadeIn 2s;
}

@keyframes fadeIn {
from {opacity: 0;}
to {opacity: 1;}
}

/* popup animation */
.popup {
display: none;
position: fixed;
top: 50%;
left: 50%;
transform: translate(-50%, -50%) scale(0.5);
background: black;
border: 1px solid #ff4df0;
padding: 20px;
animation: pop 0.4s forwards;
}

@keyframes pop {
from {opacity: 0; transform: translate(-50%, -50%) scale(0.5);}
to {opacity: 1; transform: translate(-50%, -50%) scale(1);}
}

</style>
</head>

<body>

<h1 class="glitch">OFFLINE</h1>

<p class="fade">enter my world</p>

<button>HOME</button>
<button>ABOUT</button>
<button>WORK</button>

<br>

<button onclick="openPopup()">ENTER</button>

<p class="fade">Welcome to my digital space ✧</p>

<div id="popup" class="popup">
<p>Welcome to my digital glitch space</p>
<button onclick="closePopup()">close</button>
</div>

<script>
function openPopup() {
document.getElementById("popup").style.display = "block";
}

function closePopup() {
document.getElementById("popup").style.display = "none";
}
</script>

</body>
</html>
