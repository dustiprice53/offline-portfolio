<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>OFFLINE</title>
<link rel="stylesheet" href="style.css">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* simple animations added */
h1 {
animation: flicker 2s infinite;
}

@keyframes flicker {
0% {opacity: 1;}
50% {opacity: 0.6;}
100% {opacity: 1;}
}

button {
transition: 0.3s;
}

button:hover {
transform: scale(1.1);
}

body {
animation: fadeIn 2s;
}

@keyframes fadeIn {
from {opacity: 0;}
to {opacity: 1;}
}

/* popup */
.popup {
display: none;
position: fixed;
top: 50%;
left: 50%;
transform: translate(-50%, -50%);
background: black;
color: pink;
padding: 20px;
border: 1px solid pink;
}

</style>

</head>

<body>

<div class="container">

<h1>OFFLINE</h1>

<p>enter my world</p>

<button>HOME</button>
<button>ABOUT</button>
<button>WORK</button>

<br><br>

<button onclick="openPopup()">ENTER</button>

<p>Welcome to my digital space ✧</p>

</div>

<!-- popup -->
<div id="popup" class="popup">
<p>Welcome to my digital space</p>
<button onclick="closePopup()">close</button>
</div>

<script>
function openPopup() {
document.getElementById("popup").style.display = "block";
}

function closePopup() {
document.getElementById("popup").style.display = "none";
}
</script>

</body>
</html>
